<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息数据部 · 搬迁标签登记</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;line-height:1.6}
input,select,button{font-family:inherit;font-size:14px}
input,select{height:38px;padding:0 10px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;background:#fff;transition:border-color .15s}
input:focus,select:focus{border-color:#378ADD}
button{cursor:pointer;border-radius:8px;border:1px solid #ddd;background:#fff;padding:0 16px;height:38px;transition:all .15s}
button:hover{background:#f0f0ee}

.topbar{background:#fff;border-bottom:1px solid #e8e8e6;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700}.logo span{color:#378ADD}
.user-pill{display:flex;align-items:center;gap:8px;background:#f5f5f3;border-radius:20px;padding:5px 12px 5px 6px}
.avatar{width:28px;height:28px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#185FA5;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:#888}
.logout-btn{font-size:12px;padding:0 10px;height:30px;color:#888}

.page{max-width:780px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#666;font-weight:500}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric{background:#fff;border:1px solid #e8e8e6;border-radius:10px;padding:12px 14px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700}

.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;height:42px;font-size:13px;font-weight:500;border-radius:10px}
.type-btn.ab{border-color:#185FA5;background:#E6F1FB;color:#0C447C}
.type-btn.aa{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.st-toggle{display:flex;gap:8px}
.st-btn{flex:1;height:36px;font-size:13px;border-radius:8px}
.st-btn.on{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}

.submit-btn{width:100%;height:44px;margin-top:14px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;border-color:#1a1a1a;border-radius:10px}
.submit-btn:hover{background:#333}
.submit-btn:disabled{background:#999;border-color:#999;cursor:not-allowed}

.photo-upload-area{border:1.5px dashed #ccc;border-radius:10px;padding:16px;text-align:center;cursor:pointer;background:#fafaf9;position:relative}
.photo-upload-area:hover{border-color:#378ADD}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-label{font-size:12px;color:#888;pointer-events:none}
.photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.del-photo{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;padding:0;height:18px}

.tbl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tbl-title{font-size:15px;font-weight:600}
.tbl-actions{display:flex;gap:8px}
.action-btn{font-size:12px;padding:0 10px;height:32px;color:#555;display:flex;align-items:center;gap:4px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:0 12px;height:30px;border-radius:20px}
.filter-btn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tbl-wrap{overflow-x:auto;border:1px solid #e8e8e6;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f8f6;color:#666;font-weight:600;padding:9px 10px;text-align:left;border-bottom:1px solid #e8e8e6;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf9}
.num-mono{font-family:monospace;font-size:12px;font-weight:700}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.b-box{background:#E6F1FB;color:#0C447C}
.b-asset{background:#E1F5EE;color:#085041}
.b-office{background:#FAEEDA;color:#633806}
.b-storage{background:#F1EFE8;color:#5F5E5A}
.b-admin{background:#EEEDFE;color:#3C3489;font-size:10px}

.del-btn:hover{background:#FCEBEB;color:#A32D2D}
.photo-link{font-size:11px;color:#888;cursor:pointer;text-decoration:underline}
.photo-link:hover{color:#378ADD}
.empty-state{text-align:center;padding:32px;color:#aaa;font-size:13px}
.tip{font-size:11px;color:#999;margin-top:6px;padding:6px 10px;background:#f8f8f6;border-radius:6px}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f3;padding:24px}
.login-card{background:#fff;border:1px solid #e8e8e6;border-radius:16px;padding:36px 32px;width:100%;max-width:360px}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;text-align:center;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px}
.login-btn{width:100%;height:44px;background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-size:14px;font-weight:600;border-radius:10px;margin-top:6px}
.login-btn:hover{background:#333}
.login-hint{font-size:11px;color:#aaa;text-align:center;margin-top:14px;line-height:1.6}
.login-err{font-size:12px;color:#c0392b;text-align:center;margin-top:8px;background:#FCEBEB;padding:6px 10px;border-radius:6px}

.status-bar{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404;margin-bottom:12px;display:none}
.status-bar.show{display:block}
.status-bar.err{background:#FCEBEB;border-color:#f5c6cb;color:#721c24}
.status-bar.ok{background:#d4edda;border-color:#c3e6cb;color:#155724}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:22px;color:#aaa;padding:0;height:auto;cursor:pointer}
.modal-photos{display:flex;flex-wrap:wrap;gap:10px}
.modal-photo img{width:160px;height:160px;object-fit:cover;border-radius:10px;border:1px solid #e0e0e0;cursor:pointer;display:block}

@media(max-width:540px){

  .full{grid-column:1}

  .topbar{padding:10px 14px}
  .page{padding:16px 10px 60px}
}
</style>
</head>

<script>
// ===== 成员配置 =====
const MEMBERS = {
  '石泽宇': {pw:'jwms.szy', seat:'40', initials:'石泽', admin:false},
  '段宝莲': {pw:'jwms.dbl', seat:'35', initials:'段宝', admin:false},
  '韩雄健': {pw:'jwms.hxj', seat:'36', initials:'韩雄', admin:false},
  '张岩':   {pw:'jwms.zy',  seat:'38', initials:'张岩', admin:false},
  '张旭博': {pw:'jwms.zxb', seat:'39', initials:'张旭', admin:false},
  '马小清': {pw:'jwms.mxq', seat:'34', initials:'马小', admin:true},
  '宫鹏飞': {pw:'jwms.gpf', seat:'',   initials:'宫鹏', admin:false},
  '张建业': {pw:'jwms.zjy', seat:'37', initials:'张建', admin:false},
};

let currentUser = null;
let records = [];
let fileSHA = null;
let curType = 'box';
let curSt = 'office';
let curFilter = 'all';
let pendingPhotos = {box:[], asset:[]};
let saving = false;

// ===== GitHub API =====
async function ghGet(path) {
  const res = await fetch(`${API_BASE}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
    headers: {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('读取失败 ' + res.status);
  return res.json();
}

async function ghPut(path, content, sha) {
  const body = {
    message: '更新标签数据',
    content: btoa(unescape(encodeURIComponent(content))),
  };
  if (sha) body.sha = sha;
  const res = await fetch(`${API_BASE}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('保存失败 ' + res.status);
  return res.json();
}

async function loadData() {
  showStatus('正在加载数据…', 'loading');
  try {
    const file = await ghGet(DATA_FILE);
    if (!file) {
      records = [];
      fileSHA = null;
    } else {
      fileSHA = file.sha;
      const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
      const parsed = JSON.parse(decoded);
      records = parsed.records || [];
    }
    showStatus('', '');
    updateCounters();
    renderTable();
  } catch(e) {
    showStatus('加载数据失败：' + e.message, 'err');
  }
}

async function saveData() {
  const nextNum = records.length > 0 ? Math.max(...records.map(r => parseInt(r.num.replace('SJ-',''))||0)) + 1 : 1;
  const payload = JSON.stringify({records, nextNum}, null, 2);
  try {
    const result = await ghPut(DATA_FILE, payload, fileSHA);
    fileSHA = result.content.sha;
  } catch(e) {
    throw e;
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status-bar');
  if (!msg) { el.className='status-bar'; return; }
  el.textContent = msg;
  el.className = 'status-bar show' + (type==='err' ? ' err' : type==='ok' ? ' ok' : '');
}

// ===== 登录 =====
function doLogin() {
  const name = document.getElementById('l-name').value;
  const pw   = document.getElementById('l-pw').value.trim();
  const err  = document.getElementById('l-err');
  if (!name) { err.textContent='请先选择姓名'; err.style.display='block'; return; }
  const m = MEMBERS[name];
  if (!m || pw !== m.pw) { err.textContent='姓名或密码错误'; err.style.display='block'; return; }
  err.style.display='none';
  currentUser = {name, ...m};
  document.getElementById('login-page').style.display='none';
  document.getElementById('app-page').style.display='block';
  document.getElementById('top-name').textContent = name;
  document.getElementById('top-role').textContent = m.admin ? '联络员（管理员）' : (m.seat ? '座位 '+m.seat : 'IT运维 · 非北京base');
  document.getElementById('top-avatar').textContent = m.initials;
  document.getElementById('clear-btn').style.display = m.admin ? 'flex' : 'none';
  document.getElementById('b-seat').value = m.seat || '（无固定座位）';
  loadData();
}
document.getElementById('l-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null; records = []; fileSHA = null;
  pendingPhotos = {box:[], asset:[]};
  document.getElementById('app-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('l-name').value='';
  document.getElementById('l-pw').value='';
  document.getElementById('box-preview').innerHTML='';
  document.getElementById('asset-preview').innerHTML='';
}

// ===== 表单控制 =====
function setType(t) {
  curType = t;
  document.getElementById('form-box').style.display   = t==='box' ? '' : 'none';
  document.getElementById('form-asset').style.display = t==='asset' ? '' : 'none';
  document.getElementById('tbtn-box').className   = 'type-btn' + (t==='box' ? ' ab' : '');
  document.getElementById('tbtn-asset').className = 'type-btn' + (t==='asset' ? ' aa' : '');
}
function setSt(s) {
  curSt = s;
  document.getElementById('st-office').className  = 'st-btn' + (s==='office' ? ' on' : '');
  document.getElementById('st-storage').className = 'st-btn' + (s==='storage' ? ' on' : '');
  const sw = document.getElementById('seat-wrap');
  const si = document.getElementById('b-seat');
  if(s==='storage'){sw.style.opacity='0.4';si.value='（仓储不填）';}
  else{sw.style.opacity='1';si.value=currentUser.seat||'（无固定座位）';}
}

// ===== 照片 =====
function handlePhotos(kind, input) {
  Array.from(input.files).forEach(file => {
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const idx = pendingPhotos[kind].length;
      pendingPhotos[kind].push(e.target.result);
      const wrap = document.getElementById(kind+'-preview');
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      thumb.innerHTML = `<img src="${e.target.result}"><button class="del-photo" onclick="removePhoto('${kind}',${idx},this.parentNode)">×</button>`;
      wrap.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function removePhoto(kind, idx, el) {
  pendingPhotos[kind][idx] = null;
  el.remove();
}

// ===== 添加记录 =====
async function addRecord() {
  if(saving) return;
  const btn = document.getElementById('submit-btn');

  // 先刷新拿最新数据，防止编号冲突
  showStatus('正在同步最新数据…', 'loading');
  btn.disabled = true;
  try {
    const file = await ghGet(DATA_FILE);
    if(file) {
      fileSHA = file.sha;
      const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
      const parsed = JSON.parse(decoded);
      records = parsed.records || [];
    }
  } catch(e) {}

  const nextNum = records.length > 0 ? Math.max(...records.map(r => parseInt(r.num.replace('SJ-',''))||0)) + 1 : 1;
  const photos = (pendingPhotos[curType]||[]).filter(Boolean);

  const rec = {
    id: Date.now(),
    num: 'SJ-' + nextNum,
    type: curType,
    owner: currentUser.name,
    dept: '信息数据部',
    name: currentUser.name,
    ts: new Date().toLocaleString('zh-CN',{hour12:false}),
    photos
  };

  if(curType==='box') {
    rec.storage = curSt;
    rec.seat    = curSt==='office' ? (currentUser.seat||'') : '';
    rec.detail  = curSt==='office' ? '座位:'+(currentUser.seat||'—') : '仓储区';
    rec.note    = document.getElementById('b-note').value.trim();
  } else {
    const item  = document.getElementById('a-item').value;
    const floor = document.getElementById('a-floor').value;
    if(!item){ showStatus('请选择物品类型','err'); btn.disabled=false; return; }
    rec.storage = 'office';
    rec.item    = item;
    rec.floor   = floor;
    rec.seat    = document.getElementById('a-seat').value.trim();
    rec.detail  = item + (floor ? ' · '+floor : '');
    rec.note    = document.getElementById('a-note').value.trim();
  }

  records.push(rec);
  saving = true;
  showStatus('正在保存…', 'loading');
  try {
    await saveData();
    showStatus('✓ 已保存，编号 ' + rec.num, 'ok');
    // 清空表单
    if(curType==='box'){ document.getElementById('b-note').value=''; }
    else {
      document.getElementById('a-item').value='';
      document.getElementById('a-floor').value='';
      document.getElementById('a-seat').value='';
      document.getElementById('a-note').value='';
    }
    pendingPhotos[curType]=[];
    document.getElementById(curType+'-preview').innerHTML='';
    updateCounters();
    renderTable();
  } catch(e) {
    records.pop();
    showStatus('保存失败：' + e.message, 'err');
  }
  saving = false;
  btn.disabled = false;
}

// ===== 删除 =====
async function deleteRecord(id) {
  const rec = records.find(r=>r.id===id);
  if(!rec) return;
  if(!currentUser.admin && rec.owner!==currentUser.name){ alert('只能删除自己的记录'); return; }
  if(!confirm('确认删除 '+rec.num+' ？')) return;
  records = records.filter(r=>r.id!==id);
  showStatus('正在删除…','loading');
  try {
    await saveData();
    showStatus('已删除','ok');
    updateCounters();
    renderTable();
  } catch(e) {
    showStatus('删除失败：'+e.message,'err');
  }
}

async function clearAll() {
  if(!currentUser.admin) return;
  if(!confirm('确认清空全部 '+records.length+' 条记录？')) return;
  records=[];
  showStatus('正在清空…','loading');
  try {
    await saveData();
    showStatus('已清空','ok');
    updateCounters();
    renderTable();
  } catch(e) {
    showStatus('操作失败：'+e.message,'err');
  }
}

// ===== 筛选 =====
function setFilter(btn, f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTable();
}

// ===== 统计 =====
function updateCounters() {
  document.getElementById('cnt-all').textContent   = records.length;
  document.getElementById('cnt-box').textContent   = records.filter(r=>r.type==='box').length;
  document.getElementById('cnt-asset').textContent = records.filter(r=>r.type==='asset').length;
}

// ===== 渲染表格 =====
function renderTable() {
  let list = records;
  if(curFilter==='box')   list=records.filter(r=>r.type==='box');
  if(curFilter==='asset') list=records.filter(r=>r.type==='asset');
  if(curFilter==='mine')  list=records.filter(r=>r.owner===currentUser.name);
  const tbody = document.getElementById('tbody');
  if(!list.length){ tbody.innerHTML='<tr><td colspan="8" class="empty-state">暂无记录</td></tr>'; return; }
  tbody.innerHTML = list.map(r => {
    const canDel = currentUser.admin || r.owner===currentUser.name;
    const typeBadge = r.type==='box' ? '<span class="badge b-box">箱子</span>' : '<span class="badge b-asset">资产</span>';
    const stBadge   = r.storage==='storage' ? '<span class="badge b-storage">仓储</span>' : '<span class="badge b-office">办公</span>';
    const othMark   = (currentUser.admin && r.owner!==currentUser.name) ? ' <span class="badge b-admin">他人</span>' : '';
    const photosHtml = (r.photos&&r.photos.length) ? `<span class="photo-link" onclick="openModal(${r.id})">📷 ${r.photos.length}张</span>` : '<span style="color:#ccc">—</span>';
    const delBtn = canDel ? `<button class="del-btn" onclick="deleteRecord(${r.id})">✕</button>` : '';
    return `<tr>
      <td><span class="num-mono">${r.num}</span></td>
      <td>${typeBadge}</td>
      <td>${stBadge}</td>
      <td>${r.name}${othMark}</td>
      <td title="${r.detail}">${r.detail}</td>
      <td style="color:#888" title="${r.note||''}">${r.note||'—'}</td>
      <td>${photosHtml}</td>
      <td>${delBtn}</td>
    </tr>`;
  }).join('');
}

// ===== 照片弹窗 =====
function openModal(id) {
  const rec = records.find(r=>r.id===id);
  if(!rec||!rec.photos||!rec.photos.length) return;
  document.getElementById('modal-title-text').textContent = rec.num+' · '+rec.name+' 的标签照片';
  document.getElementById('modal-photos').innerHTML = rec.photos.map(p=>
    `<div class="modal-photo"><img src="${p}" onclick="window.open('${p}')"></div>`
  ).join('');
  document.getElementById('photo-modal').classList.add('open');
}
function closeModal(e) {
  if(!e||e.target===document.getElementById('photo-modal'))
    document.getElementById('photo-modal').classList.remove('open');
}

// ===== 导出CSV =====
function exportCSV() {
  if(!records.length){ alert('暂无数据'); return; }
  const hdr='编号,类型,存放,姓名,部门,详情,备注,照片数,登记时间\n';
  const rows=records.map(r=>[r.num,r.type==='box'?'箱子标签':'固定资产',r.storage==='storage'?'仓储':'办公',r.name,r.dept,r.detail,r.note||'',(r.photos||[]).length,r.ts||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+hdr+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='信息数据部搬迁标签.csv';a.click();
  URL.revokeObjectURL(url);
}
